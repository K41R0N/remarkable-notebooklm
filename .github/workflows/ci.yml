name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check src/ tests/
      - name: Check formatting
        run: ruff format --check src/ tests/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package + mypy
        # Two-phase install: see docs/solutions/build-errors/rmapi-rmscene-no-deps-install.md
        run: |
          pip install rmscene==0.7.0
          pip install -e ".[dev]" --no-deps
      - name: mypy
        run: mypy src/

  test:
    name: Unit + Integration Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        # Two-phase install: rm-api==1.1.1 and rmscene==0.7.0 have incompatible
        # packaging pin ranges. Install rmscene first, then project with --no-deps.
        # See docs/solutions/build-errors/rmapi-rmscene-no-deps-install.md
        run: |
          pip install rmscene==0.7.0
          pip install -e ".[dev]" --no-deps
          pip install "git+https://github.com/ricklupton/rmc.git"
      - name: Run unit tests
        run: pytest tests/unit/ -v --cov=rm_notebooklm --cov-report=xml
      - name: Run integration tests (VCR cassettes only — no live network)
        run: pytest tests/integration/ -v --vcr-record=none
      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
